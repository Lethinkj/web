<!DOCTYPE html>
<html>
<head>
    <title>Image Map Example</title>
</head>
<body>

<h2>Image Map Demo</h2>

<img src="computer.jpg" usemap="#mymap" width="500" height="300">

<map name="mymap">

    <area shape="rect"
          coords="50,50,150,150"
          href="#"
          onclick="alert('Monitor clicked')">

    <area shape="circle"
          coords="250,150,40"
          href="#"
          onclick="alert('CPU clicked')">

    <area shape="rect"
          coords="350,200,450,250"
          href="#"
          onclick="alert('Keyboard clicked')">

</map>

</body>
</html>
