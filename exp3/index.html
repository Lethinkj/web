<!DOCTYPE html>
<html>
<head>

<script>

function validate()
{
var name=document.getElementById("name").value;

if(name=="")
{
alert("Enter your name");
return false;
}

alert("Form submitted successfully");
return true;
}

</script>

</head>

<body>

<form onsubmit="return validate()">

Name:
<input type="text" id="name">

<input type="submit" value="Submit">

</form>

</body>
</html>
